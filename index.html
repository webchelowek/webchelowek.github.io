<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Конвертер регистра</title>
  <style>
body {
  font-family: system-ui, Arial, sans-serif;
  margin: 24px auto;
  max-width: 900px;
  padding: 0 16px;
}

    .controls-panel {
  margin-top: 32px;
  padding: 24px;
  background: #fafafa;
  border: 1px solid #ddd;
  border-radius: 16px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
}

.smoking-wrap,
.humanity-wrap {
  padding: 18px 16px;
  background: white;
  border: 1px solid #e7e7e7;
  border-radius: 12px;
}

.humanity-wrap {
  margin-top: 18px;
}

.slider-title {
  text-align: center;
  font-size: 20px;
  margin-bottom: 12px;
}

.smoking-wrap input[type="range"],
.humanity-wrap input[type="range"] {
  display: block;
  margin: 0 auto;
}

.humanity-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}
    textarea {
      width: 100%;
      min-height: 180px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      gap: 12px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      white-space: pre-wrap;
      min-height: 60px;
    }

    input[type="range"] {
      width: 100%;
    }

    .smoking-wrap {
      margin: 24px 0 16px;
    }

    .smoking-visual {
      margin-top: 10px;
      min-height: 44px;
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
      white-space: nowrap;
      font-size: 28px;
      line-height: 1.4;
    }

    .humanity-wrap {
      margin: 24px 0 10px;
    }

    .humanity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .emoji-side {
      width: 56px;
      text-align: center;
      line-height: 1;
      user-select: none;
      transition: font-size 0.15s ease, transform 0.15s ease, opacity 0.15s ease;
      font-size: 24px;
    }

    .save-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .status {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Конвертер</h1>

  <textarea id="input" placeholder="Вставь текст..."></textarea>

  <div class="row">
    <button onclick="toUpper()">В ВЕРХНИЙ РЕГИСТР</button>
    <button onclick="toLower()">ß стu/\ьнblũ реruстр</button>
    <button onclick="copyResult()">Копировать</button>
  </div>

  <div style="margin: 14px 0;">
    yр0ßень сtu/\я::
    <strong><span id="levelValue">85</span>%</strong>
    <br>
    <input type="range" id="level" min="0" max="100" value="85" />
  </div>

  <h3>Результат:</h3>
  <pre id="output"></pre>

 <div class="controls-panel">
  <div class="smoking-wrap">
    <div class="slider-title">❁✿❀❁✿❀</div>
    <input type="range" id="smoking" min="0" max="100" value="0" />
    <div id="smokingVisual" class="smoking-visual"></div>
  </div>

  <div class="humanity-wrap">
    <div class="slider-title">########</div>
    <div class="humanity-row">
      <span id="botEmoji" class="emoji-side">🤖</span>
      <input type="range" id="humanity" min="0" max="100" value="50" />
      <span id="humanEmoji" class="emoji-side">🧑</span>
    </div>
  </div>
</div>

    <div class="save-row">
      <button onclick="saveSettings()">Save</button>
      <span id="saveStatus" class="status"></span>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_Agml7ZT59jVTma77o1PFm7ja9z6UlGQWN5HJAEWilPbJAR9jAY0T_yd7ZD80JA/exec";

    const input = document.getElementById("input");
    const output = document.getElementById("output");

    const level = document.getElementById("level");
    const levelValue = document.getElementById("levelValue");

    const humanity = document.getElementById("humanity");
    const botEmoji = document.getElementById("botEmoji");
    const humanEmoji = document.getElementById("humanEmoji");

    const smoking = document.getElementById("smoking");
    const smokingValue = document.getElementById("smokingValue");
    const smokingVisual = document.getElementById("smokingVisual");

    const saveStatus = document.getElementById("saveStatus");

    function toUpper() {
      output.textContent = input.value.toUpperCase();
    }

    function copyResult() {
      const text = output.textContent;
      if (!text) return;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text);
      } else {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      }
    }

    level.addEventListener("input", () => {
      levelValue.textContent = level.value;
    });

    function toLower() {
      const map = {
        "л": "/\\",
        "и": "u",
        "ы": "bl",
        "в": "ß",
        "б": "6",
        "т": "t",
        "з": "3",
        "о": "0",
        "ш": "w",
        "п": "n",
        "г": "r",
        "у": "y",
        "й": "ũ",
        "м": "m",
        "я": "9l",
        "ч": "4",
        "к": "k",
        "?": "¿",
        "д": "g"
      };

      const p = level.value / 100;

      const text = input.value
        .toLowerCase()
        .replace(/[лиывтбзошпгуймячк?д]/g, ch =>
          Math.random() < p ? map[ch] : ch
        );

      output.textContent = text;
    }

    function updateHumanityVisual() {
      const v = Number(humanity.value) / 100;

      const botSize = 24 + (1 - v) * 28;
      const humanSize = 24 + v * 28;

      botEmoji.style.fontSize = `${botSize}px`;
      humanEmoji.style.fontSize = `${humanSize}px`;

      botEmoji.style.opacity = String(0.45 + (1 - v) * 0.55);
      humanEmoji.style.opacity = String(0.45 + v * 0.55);

      botEmoji.style.transform = `scale(${0.9 + (1 - v) * 0.35})`;
      humanEmoji.style.transform = `scale(${0.9 + v * 0.35})`;
    }

    function getSmokingSlots() {
      const width = smokingVisual.clientWidth || 600;
      return Math.max(8, Math.floor(width / 32));
    }

    function updateSmokingVisual() {
      const value = Number(smoking.value);
      smokingValue.textContent = value;

      const slots = getSmokingSlots();

      if (value === 0) {
        smokingVisual.textContent = "🌼".repeat(slots);
        return;
      }

      if (value === 100) {
        smokingVisual.textContent = "💀".repeat(slots);
        return;
      }

      const count = Math.max(1, Math.round((value / 100) * slots));
      smokingVisual.textContent = "🚬".repeat(count);
    }

    humanity.addEventListener("input", updateHumanityVisual);
    smoking.addEventListener("input", updateSmokingVisual);
    window.addEventListener("resize", updateSmokingVisual);

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cbName = `jsonp_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement("script");

        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 10000);

        function cleanup() {
          clearTimeout(timeout);
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          delete window[cbName];
        }

        window[cbName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("JSONP script load error"));
        };

        script.src =
          `${url}${url.includes("?") ? "&" : "?"}` +
          `prefix=${encodeURIComponent(cbName)}&_ts=${Date.now()}`;

        document.body.appendChild(script);
      });
    }

    async function loadSavedState() {
      updateHumanityVisual();
      updateSmokingVisual();

      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_")) {
        saveStatus.textContent = "URL Apps Script не задан";
        return;
      }

      saveStatus.textContent = "Загружаю...";

      try {
        const data = await jsonp(`${APPS_SCRIPT_URL}?action=get`);

        if (!data || data.ok !== true) {
          saveStatus.textContent = data && data.error ? data.error : "Ошибка загрузки";
          return;
        }

        if (Number.isFinite(Number(data.level))) {
          level.value = Number(data.level);
          levelValue.textContent = String(data.level);
        }

        if (Number.isFinite(Number(data.humanity))) {
          humanity.value = Number(data.humanity);
        }

        if (Number.isFinite(Number(data.smoking))) {
          smoking.value = Number(data.smoking);
        }

        updateHumanityVisual();
        updateSmokingVisual();
        saveStatus.textContent = "";
      } catch (err) {
        console.error(err);
        updateHumanityVisual();
        updateSmokingVisual();
        saveStatus.textContent = "Не удалось загрузить";
      }
    }

    async function saveSettings() {
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_")) {
        saveStatus.textContent = "URL Apps Script не задан";
        return;
      }

      saveStatus.textContent = "Сохраняю...";

      try {
        const url =
          `${APPS_SCRIPT_URL}?action=set` +
          `&level=${encodeURIComponent(level.value)}` +
          `&humanity=${encodeURIComponent(humanity.value)}` +
          `&smoking=${encodeURIComponent(smoking.value)}`;

        const data = await jsonp(url);

        if (!data || data.ok !== true) {
          saveStatus.textContent = data && data.error ? data.error : "Ошибка";
          return;
        }

        saveStatus.textContent = "Сохранено";
      } catch (err) {
        console.error(err);
        saveStatus.textContent = "Ошибка сохранения";
      }
    }

    updateHumanityVisual();
    updateSmokingVisual();
    loadSavedState();
  </script>

</body>
</html>
